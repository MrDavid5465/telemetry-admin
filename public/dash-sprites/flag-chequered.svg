      <rect width="10" height="10" fill="#ffffff"/>
      <rect x="10" y="0" width="10" height="10" fill="#000000"/>
      <rect x="0" y="10" width="10" height="10" fill="#000000"/>
      <rect x="10" y="10" width="10" height="10" fill="#ffffff"/>
