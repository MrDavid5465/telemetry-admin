<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="tachFace" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <radialGradient id="hubGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#222"/>
    </radialGradient>
  </defs>

  <!-- Chrome outer ring -->
  <circle cx="200" cy="200" r="198" fill="#1c1c1c" stroke="#3e3e3e" stroke-width="5"/>
  <circle cx="200" cy="200" r="193" fill="#111" stroke="#262626" stroke-width="1.5"/>

  <!-- Face -->
  <circle cx="200" cy="200" r="190" fill="url(#tachFace)"/>

  <!-- Subtle concentric rings (Mk7 style texture) -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#1e1e1e" stroke-width="1"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Track arc (270° from 135° to 45° CW, r=166, background) -->
  <!-- start at 135°: (82.6, 317.4), end at 45°: (317.4, 317.4) -->
  <path d="M 82.6 317.4 A 166 166 0 1 1 317.4 317.4"
        fill="none" stroke="#1e1e1e" stroke-width="14" stroke-linecap="butt"/>

  <!-- Orange zone arc 5.5–6.0 (SVG angles 347.14° → 6.43°, r=166) -->
  <!-- 5.5 at r=166: (200+166*cos347.14°, 200+166*sin347.14°) = (200+161.8, 200-36.9) = (361.8, 163.1) -->
  <!-- 6.0 at r=166: (200+166*cos6.43°, 200+166*sin6.43°) = (200+164.9, 200+18.6) = (364.9, 218.6) -->
  <path d="M 361.8 163.1 A 166 166 0 0 1 364.9 218.6"
        fill="none" stroke="#e06000" stroke-width="14" stroke-linecap="butt"/>

  <!-- Red zone arc 6.0–7.0 (6.43° → 45°, r=166) -->
  <!-- 7.0 at r=166: (317.4, 317.4) -->
  <path d="M 364.9 218.6 A 166 166 0 0 1 317.4 317.4"
        fill="none" stroke="#c00020" stroke-width="14" stroke-linecap="butt"/>

  <!-- Major tick marks (n=0..7, rot = 135 + n/7*270 - 270) -->
  <!-- Outer r=170 → y1=30; inner-major r=150 → y2=50 -->
  <g transform="rotate(-135, 200, 200)"><line x1="200" y1="28" x2="200" y2="52" stroke="#c8c8c8" stroke-width="3" stroke-linecap="round"/></g>
  <g transform="rotate(-96.43, 200, 200)"><line x1="200" y1="28" x2="200" y2="52" stroke="#c8c8c8" stroke-width="3" stroke-linecap="round"/></g>
  <g transform="rotate(-57.86, 200, 200)"><line x1="200" y1="28" x2="200" y2="52" stroke="#c8c8c8" stroke-width="3" stroke-linecap="round"/></g>
  <g transform="rotate(-19.29, 200, 200)"><line x1="200" y1="28" x2="200" y2="52" stroke="#c8c8c8" stroke-width="3" stroke-linecap="round"/></g>
  <g transform="rotate(19.29, 200, 200)"><line x1="200" y1="28" x2="200" y2="52" stroke="#c8c8c8" stroke-width="3" stroke-linecap="round"/></g>
  <g transform="rotate(57.86, 200, 200)"><line x1="200" y1="28" x2="200" y2="52" stroke="#c8c8c8" stroke-width="3" stroke-linecap="round"/></g>
  <!-- n=6 orange -->
  <g transform="rotate(96.43, 200, 200)"><line x1="200" y1="28" x2="200" y2="52" stroke="#e06000" stroke-width="3" stroke-linecap="round"/></g>
  <!-- n=7 red -->
  <g transform="rotate(135, 200, 200)"><line x1="200" y1="28" x2="200" y2="52" stroke="#c00020" stroke-width="3" stroke-linecap="round"/></g>

  <!-- Minor tick marks (every 0.5, r=170→y1=28, r=162→y2=38) -->
  <g transform="rotate(-115.71, 200, 200)"><line x1="200" y1="28" x2="200" y2="38" stroke="#606060" stroke-width="1.5"/></g>
  <g transform="rotate(-77.14, 200, 200)"><line x1="200" y1="28" x2="200" y2="38" stroke="#606060" stroke-width="1.5"/></g>
  <g transform="rotate(-38.57, 200, 200)"><line x1="200" y1="28" x2="200" y2="38" stroke="#606060" stroke-width="1.5"/></g>
  <g transform="rotate(0, 200, 200)"><line x1="200" y1="28" x2="200" y2="38" stroke="#606060" stroke-width="1.5"/></g>
  <g transform="rotate(38.57, 200, 200)"><line x1="200" y1="28" x2="200" y2="38" stroke="#606060" stroke-width="1.5"/></g>
  <g transform="rotate(77.14, 200, 200)"><line x1="200" y1="28" x2="200" y2="38" stroke="#e06000" stroke-width="1.5"/></g>
  <g transform="rotate(115.71, 200, 200)"><line x1="200" y1="28" x2="200" y2="38" stroke="#c00020" stroke-width="1.5"/></g>

  <!-- Number labels (r=128 from center) -->
  <!-- n=1: angle=173.57°, (72.9, 215.2) -->
  <text x="72.9" y="219.2" text-anchor="middle" dominant-baseline="middle" fill="#d8d8d8" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="200">1</text>
  <!-- n=2: angle=212.14°, (91.5, 132.2) -->
  <text x="91.5" y="136.2" text-anchor="middle" dominant-baseline="middle" fill="#d8d8d8" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="200">2</text>
  <!-- n=3: angle=250.71°, (157.9, 79.5) -->
  <text x="157.9" y="83.5" text-anchor="middle" dominant-baseline="middle" fill="#d8d8d8" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="200">3</text>
  <!-- n=4: angle=289.29°, (242.1, 79.5) -->
  <text x="242.1" y="83.5" text-anchor="middle" dominant-baseline="middle" fill="#d8d8d8" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="200">4</text>
  <!-- n=5: angle=327.86°, (308.5, 132.2) -->
  <text x="308.5" y="136.2" text-anchor="middle" dominant-baseline="middle" fill="#d8d8d8" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="200">5</text>
  <!-- n=6: angle=6.43°, (327.1, 214.3), orange -->
  <text x="327.1" y="218.3" text-anchor="middle" dominant-baseline="middle" fill="#e06000" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="200">6</text>

  <!-- Unit label -->
  <text x="200" y="265" text-anchor="middle" fill="#666" font-family="Arial,Helvetica,sans-serif" font-size="11" letter-spacing="0.5">×1000 r/min</text>

  <!-- Center hub -->
  <circle cx="200" cy="200" r="26" fill="url(#hubGrad)" stroke="#444" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="7" fill="#888"/>
  <circle cx="200" cy="200" r="4" fill="#333"/>
</svg>
