<svg xmlns="http://www.w3.org/2000/svg" width="40" height="170" viewBox="0 0 40 170">
  <defs>
    <linearGradient id="needleBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="40%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <linearGradient id="needleTip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3030"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Needle body: tapers from hub (y=145) to tip (y=12) -->
  <!-- Width: 12px at hub, 2px at tip -->
  <polygon points="20,12 22.5,80 24,145 16,145 17.5,80 17.5,12" fill="url(#needleBody)"/>

  <!-- Red tip accent (top portion) -->
  <polygon points="20,12 21,45 19,45" fill="url(#needleTip)" filter="url(#glow)"/>

  <!-- Counterweight blob at bottom -->
  <ellipse cx="20" cy="156" rx="11" ry="13" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <ellipse cx="20" cy="156" rx="7" ry="9" fill="#282828"/>

  <!-- Center ring at pivot (y=145) -->
  <circle cx="20" cy="145" r="7" fill="#2a2a2a" stroke="#666" stroke-width="1.5"/>
  <circle cx="20" cy="145" r="3" fill="#888"/>
</svg>
